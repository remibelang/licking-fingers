<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management | Licking Fingers Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        nav {
            background: rgba(0,0,0,0.4);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .logo {
            font-size: 1.3rem;
            color: #ffd700;
            font-weight: 700;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: #ffd700; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 2rem;
        }

        .form-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ffd700;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ffd700;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        button:hover {
            transform: scale(1.02);
        }

        button.delete {
            background: #ff4444;
            color: #fff;
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .menu-list {
            display: grid;
            gap: 1rem;
        }

        .menu-item-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 1.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .menu-item-card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        .item-info {
            flex: 1;
        }

        .item-info h3 {
            color: #ffd700;
            margin-bottom: 0.3rem;
        }

        .item-info p {
            opacity: 0.7;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .item-price {
            color: #00ff88;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .item-actions {
            display: flex;
            gap: 10px;
        }

        .success {
            color: #00ff88;
            margin-top: 1rem;
        }

        .error {
            color: #ff4444;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .menu-item-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">👅 Licking Fingers Admin</div>
        <div class="nav-links">
            <a href="admin-menu.html">Menu</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>Menu Management</h1>

        <div class="form-section">
            <h3 style="color: #ffd700; margin-bottom: 1rem;">Add New Item</h3>
            <form id="menuForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Item Name *</label>
                        <input type="text" id="itemName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Price ($) *</label>
                        <input type="number" id="itemPrice" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Category</label>
                        <select id="itemCategory">
                            <option value="Main">Main Dish</option>
                            <option value="Appetizer">Appetizer</option>
                            <option value="Drink">Drink</option>
                            <option value="Dessert">Dessert</option>
                        </select>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="itemAvailable" checked>
                            Available
                        </label>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Description</label>
                        <textarea id="itemDesc"></textarea>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Food Image</label>
                        <input type="file" id="itemImage" accept="image/*">
                    </div>
                </div>
                
                <button type="submit" style="margin-top: 1rem;">Add Item</button>
                <div id="formMessage"></div>
            </form>
        </div>

        <h2 style="color: #ffd700; margin-bottom: 1rem;">Current Menu Items</h2>
        <div id="menuList" class="menu-list">
            <p>Loading menu items...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE CONFIG - INLINE FOR ADMIN
        // ============================================
        
        const SUPABASE_URL = 'https://hejqkxwtdpbguymshxmq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CKoBtZ4r3Bqkr8mOfOyTig_Q58ZS_YO';
        
        let supabaseClient = null;
        let initAttempts = 0;
        const maxAttempts = 50;
        
        function tryInitSupabase() {
            initAttempts++;
            
            if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase client created successfully');
                window.dispatchEvent(new Event('supabaseReady'));
                return true;
            }
            
            if (initAttempts < maxAttempts) {
                setTimeout(tryInitSupabase, 100);
            } else {
                console.error('Failed to initialize Supabase');
                document.getElementById('formMessage').textContent = 'Failed to connect to database.';
                document.getElementById('formMessage').className = 'error';
            }
            return false;
        }
        
        tryInitSupabase();
    </script>
    <script>
        // ============================================
        // ADMIN MENU MANAGEMENT
        // ============================================

        // Check admin login
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'admin-login.html';
        }

        // Wait for Supabase to be ready
        document.addEventListener('DOMContentLoaded', () => {
            if (supabaseClient && typeof supabaseClient.from === 'function') {
                loadMenuItems();
            } else {
                window.addEventListener('supabaseReady', loadMenuItems);
            }
        });

        async function loadMenuItems() {
            const container = document.getElementById('menuList');
            
            try {
                const { data: items, error } = await supabaseClient
                    .from('menu_items')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!items || items.length === 0) {
                    container.innerHTML = '<p>No menu items yet. Add your first item above!</p>';
                    return;
                }

                container.innerHTML = items.map(item => {
                    let imageUrl = 'assets/placeholder-food.jpg';
                    if (item.image_path) {
                        if (item.image_path.startsWith('http')) {
                            imageUrl = item.image_path;
                        } else {
                            const { data } = supabaseClient.storage
                                .from('menu-images')
                                .getPublicUrl(item.image_path);
                            imageUrl = data.publicUrl;
                        }
                    }

                    return `
                    <div class="menu-item-card">
                        <img src="${imageUrl}" alt="${item.name}" onerror="this.src='assets/placeholder-food.jpg'">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p>${item.description || 'No description'}</p>
                            <div class="item-price">$${parseFloat(item.price).toFixed(2)}</div>
                            <small style="opacity: 0.6;">${item.category} | ${item.available ? 'Available' : 'Not Available'}</small>
                        </div>
                        <div class="item-actions">
                            <button class="delete" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (err) {
                console.error('Error loading menu:', err);
                container.innerHTML = '<p>Error loading menu items.</p>';
            }
        }

        // Add new item
        document.getElementById('menuForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const category = document.getElementById('itemCategory').value;
            const available = document.getElementById('itemAvailable').checked;
            const description = document.getElementById('itemDesc').value;
            const fileInput = document.getElementById('itemImage');
            const messageDiv = document.getElementById('formMessage');
            
            try {
                let imagePath = null;
                
                // Upload image if provided
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
                    
                    const { error: uploadError } = await supabaseClient.storage
                        .from('menu-images')
                        .upload(fileName, file);
                    
                    if (uploadError) throw uploadError;
                    imagePath = fileName;
                }
                
                // Insert menu item
                const { error } = await supabaseClient
                    .from('menu_items')
                    .insert([{
                        name,
                        price: parseFloat(price),
                        category,
                        available,
                        description,
                        image_path: imagePath,
                        created_at: new Date().toISOString()
                    }]);
                
                if (error) throw error;
                
                messageDiv.textContent = 'Item added successfully!';
                messageDiv.className = 'success';
                document.getElementById('menuForm').reset();
                loadMenuItems();
                
                setTimeout(() => messageDiv.textContent = '', 3000);
                
            } catch (err) {
                console.error('Error adding item:', err);
                messageDiv.textContent = 'Error: ' + err.message;
                messageDiv.className = 'error';
            }
        });

        // Delete item
        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            try {
                const { error } = await supabaseClient
                    .from('menu_items')
                    .delete()
                    .eq('id', id);
                
                if (error) throw error;
                
                loadMenuItems();
            } catch (err) {
                console.error('Error deleting item:', err);
                alert('Error deleting item: ' + err.message);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin-login.html';
        }
    </script>

</body>
</html>
