<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders | Licking Fingers Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        nav {
            background: rgba(0,0,0,0.4);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .logo {
            font-size: 1.3rem;
            color: #ffd700;
            font-weight: 700;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: #ffd700; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 2rem;
        }

        .orders-grid {
            display: grid;
            gap: 1rem;
        }

        .order-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 1.5rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .order-id {
            color: #ffd700;
            font-weight: 600;
        }

        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-pending { background: rgba(255,170,0,0.2); color: #ffaa00; }
        .status-preparing { background: rgba(0,150,255,0.2); color: #0096ff; }
        .status-ready { background: rgba(0,255,136,0.2); color: #00ff88; }
        .status-delivered { background: rgba(100,100,100,0.2); color: #aaa; }

        .order-details p {
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .order-total {
            color: #00ff88;
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 1rem;
        }

        .no-orders {
            text-align: center;
            padding: 3rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">👅 Licking Fingers Admin</div>
        <div class="nav-links">
            <a href="admin-menu.html">Menu</a>
            <a href="admin-orders.html">Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>Orders</h1>
        <div id="ordersList" class="orders-grid">
            <p class="no-orders">Loading orders...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE CONFIG - INLINE FOR ADMIN
        // ============================================
        
        const SUPABASE_URL = 'https://hejqkxwtdpbguymshxmq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CKoBtZ4r3Bqkr8mOfOyTig_Q58ZS_YO';
        
        let supabaseClient = null;
        let initAttempts = 0;
        const maxAttempts = 50;
        
        function tryInitSupabase() {
            initAttempts++;
            
            if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase client created successfully');
                window.dispatchEvent(new Event('supabaseReady'));
                return true;
            }
            
            if (initAttempts < maxAttempts) {
                setTimeout(tryInitSupabase, 100);
            }
            return false;
        }
        
        tryInitSupabase();
    </script>
    <script>
        // ============================================
        // ADMIN ORDERS
        // ============================================

        // Check admin login
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'admin-login.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (supabaseClient && typeof supabaseClient.from === 'function') {
                loadOrders();
            } else {
                window.addEventListener('supabaseReady', loadOrders);
            }
        });

        async function loadOrders() {
            const container = document.getElementById('ordersList');
            
            try {
                const { data: orders, error } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!orders || orders.length === 0) {
                    container.innerHTML = '<p class="no-orders">No orders yet.</p>';
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">Order #${order.id}</span>
                            <span class="order-status status-${order.status || 'pending'}">${order.status || 'Pending'}</span>
                        </div>
                        <div class="order-details">
                            <p><strong>Customer:</strong> ${order.customer_name || 'N/A'}</p>
                            <p><strong>Phone:</strong> ${order.customer_phone || 'N/A'}</p>
                            <p><strong>Address:</strong> ${order.customer_address || 'N/A'}</p>
                            <p><strong>Items:</strong> ${order.items || 'N/A'}</p>
                            <div class="order-total">Total: $${parseFloat(order.total || 0).toFixed(2)}</div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error('Error loading orders:', err);
                container.innerHTML = '<p class="no-orders">Error loading orders.</p>';
            }
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin-login.html';
        }
    </script>

</body>
</html>
