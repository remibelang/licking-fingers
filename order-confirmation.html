<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation | Licking Fingers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .success-header {
            text-align: center;
            padding: 50px 20px;
            background: rgba(0,255,136,0.1);
            border: 2px solid #00ff88;
            border-radius: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .success-header h1 { color: #00ff88; font-size: 2.5rem; margin-bottom: 10px; }
        .order-id-box {
            background: rgba(255,215,0,0.15);
            border: 2px solid #ffd700;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin: 25px 0;
        }
        .order-id-box strong { font-size: 1.3rem; color: #ffd700; }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.1);
            animation: fadeIn 0.8s ease 0.2s both;
        }
        .section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            padding-bottom: 10px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .detail-row:last-child { border-bottom: none; }
        .items-list { margin-top: 20px; }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .total-section {
            background: rgba(255,215,0,0.1);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #1a1a2e;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,215,0,0.3); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid #ffd700;
        }
        .btn-secondary:hover { background: rgba(255,215,0,0.1); }
        .error-message {
            background: rgba(255,0,0,0.15);
            border: 2px solid #ff4444;
            color: #ff6666;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #ffd700;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .status-pending { background: #ff9800; color: #000; }
        .status-preparing { background: #2196f3; color: #fff; }
        .status-ready { background: #00ff88; color: #000; }
        .status-delivered { background: #4caf50; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <div class="loading">Loading order details...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        document.addEventListener('supabase-ready', loadOrderDetails);
        document.addEventListener('DOMContentLoaded', initSupabase);

        function getUrlParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }

        async function loadOrderDetails() {
            const content = document.getElementById('content');
            const orderCode = getUrlParam('order_id');

            if (!orderCode) {
                content.innerHTML = `
                    <div class="error-message">
                        <h2>❌ No Order ID Found</h2>
                        <p>No order ID was provided in the URL.</p>
                        <div class="actions"><a href="index.html" class="btn btn-primary">Back to Menu</a></div>
                    </div>`;
                return;
            }

            try {
                const { data: orders, error } = await supabaseClient
                    .from('orders')
                    .select('*, order_items(*)')
                    .eq('order_code', orderCode);

                if (error) throw error;
                if (!orders || orders.length === 0) {
                    content.innerHTML = `
                        <div class="error-message">
                            <h2>❌ Order Not Found</h2>
                            <p>We couldn't find order <strong>${orderCode}</strong>.</p>
                            <div class="actions">
                                <a href="index.html" class="btn btn-primary">Back to Menu</a>
                                <a href="track-order.html" class="btn btn-secondary">Track Order</a>
                            </div>
                        </div>`;
                    return;
                }

                const order = orders[0];
                const status = order.status || 'pending';
                const statusClass = `status-${status}`;

                let itemsHtml = '';
                let subtotal = 0;

                if (order.order_items) {
                    order.order_items.forEach(item => {
                        const itemTotal = item.price * item.quantity;
                        subtotal += itemTotal;
                        itemsHtml += `
                            <div class="item">
                                <div>
                                    <h4 style="color: #ffd700;">${item.item_name}</h4>
                                    <p style="font-size: 0.85rem; color: #aaa;">Qty: ${item.quantity} × ${formatCurrency(item.price)}</p>
                                </div>
                                <div style="color: #ffd700; font-weight: 700;">${formatCurrency(itemTotal)}</div>
                            </div>`;
                    });
                }

                const date = order.created_at ? new Date(order.created_at).toLocaleString() : 'Just now';

                content.innerHTML = `
                    <div class="success-header">
                        <h1>✅ Order Confirmed!</h1>
                        <p>Thank you for your order from 👅 Licking Fingers!</p>
                        <div class="order-id-box">
                            <div style="margin-bottom: 8px;">Your Order ID:</div>
                            <strong>${order.order_code}</strong>
                            <div style="margin-top: 15px;">
                                Status: <span class="status-badge ${statusClass}">${status}</span>
                            </div>
                        </div>
                        <p style="margin-top: 15px; font-size: 0.9rem; color: #aaa;">Placed on ${date}</p>
                    </div>

                    <div class="section">
                        <h2>👤 Customer Information</h2>
                        <div class="detail-row"><span>Name</span><span>${order.customer_name || 'N/A'}</span></div>
                        <div class="detail-row"><span>Email</span><span>${order.customer_email || 'N/A'}</span></div>
                        <div class="detail-row"><span>Phone</span><span>${order.customer_phone || 'N/A'}</span></div>
                        <div class="detail-row"><span>Address</span><span>${order.customer_address || 'N/A'}</span></div>
                    </div>

                    <div class="section">
                        <h2>🍽️ Items Ordered</h2>
                        <div class="items-list">${itemsHtml}</div>
                        <div class="total-section">
                            <div class="detail-row"><span>Subtotal</span><span>${formatCurrency(order.subtotal || subtotal)}</span></div>
                            <div class="detail-row"><span>Tax (8%)</span><span>${formatCurrency(order.tax || (subtotal * 0.08))}</span></div>
                            <div class="detail-row"><span>Delivery</span><span>${formatCurrency(order.delivery || 5)}</span></div>
                            <div class="detail-row" style="font-size: 1.3rem; font-weight: 700; color: #ffd700; margin-top: 10px; border-top: 2px solid #ffd700; padding-top: 10px;">
                                <span>Total</span><span>${formatCurrency(order.total)}</span>
                            </div>
                        </div>
                    </div>

                    <div class="actions">
                        <a href="index.html" class="btn btn-primary">Order More Food</a>
                        <a href="track-order.html?order_id=${orderCode}" class="btn btn-secondary">Track Order</a>
                    </div>
                `;

            } catch (error) {
                console.error('Error loading order:', error);
                content.innerHTML = `
                    <div class="error-message">
                        <h2>❌ Error Loading Order</h2>
                        <p>Failed to load order details. Please try again.</p>
                        <div class="actions"><a href="index.html" class="btn btn-primary">Back to Menu</a></div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
